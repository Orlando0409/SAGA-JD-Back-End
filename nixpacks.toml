# nixpacks.toml

[variables]
# Fuerza a Puppeteer a descargar el navegador dentro de la carpeta del proyecto
PUPPETEER_CACHE_DIR = "/app/.puppeteer_cache"

[phases.setup]
aptPkgs = [
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "curl",
  "wget"
]

[phases.install]
# Instalamos dependencias y descargamos el navegador usando la nueva ruta de la caché
cmds = [
  "pnpm install", 
  "pnpm exec puppeteer browsers install chrome --path /app/.puppeteer_cache"
]