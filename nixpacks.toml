# nixpacks.toml

[phases.setup]
# Lista actualizada y compatible con Ubuntu 24.04 (Noble)
aptPkgs = [
  "chromium-browser",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "curl",
  "wget"
]

[phases.install]
cmds = ["pnpm install", "pnpm exec puppeteer browsers install chrome"]